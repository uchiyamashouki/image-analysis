<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投球・腰軌道トラッカー</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>投球・腰軌道トラッカー</h1>
      <p>
        単一カメラの投球動画から、腰の移動軌道・簡易奥行き補正・ステップ幅概算を行います。
        解析パネルを複製して、複数動画を並行して比較できます。
      </p>

      <div class="top-actions">
        <button id="addWorkspaceBtn" class="primary" type="button">解析ページを追加</button>
      </div>
    </header>

    <section class="panel info-panel">
      <h2>使い方</h2>
      <ul>
        <li>「解析ページを追加」で動画ごとの解析パネルを作れます。</li>
        <li>各パネルは独立しているので、別動画を個別に解析できます。</li>
        <li>なるべく真横に近く、全身が映る動画が向いています。</li>
        <li>比較用途向けの簡易解析です。厳密な3次元計測ではありません。</li>
      </ul>
    </section>

    <div id="workspaceContainer" class="workspace-container"></div>
  </div>

  <template id="workspaceTemplate">
    <section class="workspace panel">
      <div class="workspace-header">
        <div>
          <h2 class="workspace-title">解析ページ</h2>
          <p class="workspace-subtitle">動画ごとに独立して解析できます</p>
        </div>
        <div class="workspace-actions">
          <button class="duplicateWorkspaceBtn secondary" type="button">複製</button>
          <button class="removeWorkspaceBtn danger" type="button">削除</button>
        </div>
      </div>

      <section class="subpanel controls">
        <h3>入力</h3>

        <div class="grid">
          <label class="field">
            <span>動画ファイル</span>
            <input class="videoFile" type="file" accept="video/*" />
          </label>

          <label class="field">
            <span>投手の身長 (cm)</span>
            <input class="heightCm" type="number" min="100" max="250" step="0.1" value="180" />
          </label>

          <label class="field">
            <span>利き腕</span>
            <select class="throwingHand">
              <option value="right">右投げ</option>
              <option value="left">左投げ</option>
            </select>
          </label>

          <label class="field">
            <span>解析FPS</span>
            <input class="analysisFps" type="number" min="5" max="60" step="1" value="20" />
          </label>

          <label class="field">
            <span>軌道の平滑化窓</span>
            <input class="smoothWindow" type="number" min="1" max="31" step="2" value="7" />
          </label>

          <label class="field">
            <span>表示する軌道の長さ (フレーム)</span>
            <input class="trailLength" type="number" min="5" max="300" step="1" value="50" />
          </label>
        </div>

        <div class="actions">
          <button class="loadBtn secondary" type="button">入力だけ確認</button>
          <button class="analyzeBtn primary" type="button">解析開始</button>
          <button class="stopBtn danger" type="button" disabled>停止</button>
        </div>

        <div class="progress-wrap">
          <progress class="progressBar" value="0" max="1"></progress>
          <div class="statusText">未初期化</div>
        </div>
      </section>

      <section class="subpanel viewer">
        <h3>映像プレビュー</h3>
        <div class="canvas-wrap">
          <canvas class="overlayCanvas"></canvas>
        </div>
        <video class="sourceVideo" playsinline muted preload="metadata" hidden></video>
      </section>

      <section class="subpanel summary">
        <h3>解析結果</h3>
        <div class="cards">
          <div class="card">
            <div class="label">最大ステップ幅</div>
            <div class="value metricStepWidth">-</div>
          </div>
          <div class="card">
            <div class="label">腰の前後移動範囲</div>
            <div class="value metricHipXRange">-</div>
          </div>
          <div class="card">
            <div class="label">腰の上下移動範囲</div>
            <div class="value metricHipYRange">-</div>
          </div>
          <div class="card">
            <div class="label">最大腰速度</div>
            <div class="value metricHipSpeed">-</div>
          </div>
          <div class="card">
            <div class="label">推定下肢長</div>
            <div class="value metricLegLength">-</div>
          </div>
          <div class="card">
            <div class="label">ステップ幅 / 推定下肢長</div>
            <div class="value metricStepRatio">-</div>
          </div>
        </div>

        <div class="note">
          ※ 単一カメラの簡易解析です。投手間比較や特徴把握向けです。
        </div>
      </section>

      <section class="subpanel charts">
        <h3>腰軌道</h3>
        <div class="chart-grid">
          <div class="chart-box">
            <h4>XY軌道</h4>
            <canvas class="trajectoryCanvas" width="900" height="520"></canvas>
          </div>
          <div class="chart-box">
            <h4>時系列</h4>
            <canvas class="timeseriesCanvas" width="900" height="520"></canvas>
          </div>
        </div>
      </section>

      <section class="subpanel exports">
        <h3>出力</h3>
        <div class="actions">
          <button class="downloadCsvBtn" type="button" disabled>CSVダウンロード</button>
          <button class="downloadPngBtn" type="button" disabled>軌道PNGダウンロード</button>
          <button class="exportVideoBtn" type="button" disabled>注釈付き動画を書き出し</button>
        </div>
        <div class="exportStatus">未出力</div>
      </section>
    </section>
  </template>

  <script type="module" src="script.js"></script>
</body>
</html>
